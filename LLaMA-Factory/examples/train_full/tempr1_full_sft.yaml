
### model
model_name_or_path: /model/llama3.1-8B-Instruct
trust_remote_code: true
flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z3_offload_config.json  # choices: [ds_z0_config.json, ds_z2_config.json, ds_z3_config.json]

### dataset
dataset: multitq_sft_train
template: llama
cutoff_len: 8192
max_samples: 1000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/llama3.1-8b-it/full/sft
logging_steps: 5
save_strategy: epoch
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: [tensorboard]  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 5
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
gradient_checkpointing: true

